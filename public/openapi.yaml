openapi: 3.0.3

info:
  title: Abubakar Portfolio API
  description: Portfolio API for blogs, GitHub repositories, chatbot, contact form, and admin dashboard.
  version: 1.0.0

servers:
  - url: http://localhost:8787
    description: Local Development

  - url: https://portfolio-worker.abubakarsiddiqmohiuddin.workers.dev/
    description: Production

paths:

  /api/test:
    get:
      summary: Health check endpoint

      responses:
        "200":
          description: Worker is running

  /api/contact:
    post:
      summary: Submit contact form

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - name
                - email
                - message

              properties:
                name:
                  type: string

                email:
                  type: string

                message:
                  type: string

      responses:
        "200":
          description: Contact submitted successfully

        "400":
          description: Validation failed

        "429":
          description: Rate limit exceeded

        "500":
          description: Server error

  /api/chat:
    post:
      summary: Chat with portfolio assistant

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                history:
                  type: array

                  items:
                    type: object

                    properties:

                      role:
                        type: string

                      parts:
                        type: array

                        items:
                          type: object

                          properties:
                            text:
                              type: string

      responses:
        "200":
          description: Chat response returned

        "400":
          description: Invalid request body

        "429":
          description: Rate limit exceeded

        "502":
          description: AI service unavailable

        "500":
          description: Server error

  /api/admin/login:
    post:
      summary: Admin login

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                password:
                  type: string

      responses:
        "200":
          description: Login successful

        "401":
          description: Invalid password

        "429":
          description: Too many login attempts

        "500":
          description: Server error

  /api/admin/logout:
    post:
      summary: Admin logout

      security:
        - cookieAuth: []

      responses:
        "200":
          description: Logout successful

        "429":
          description: Rate limit exceeded

  /api/admin/check:
    get:
      summary: Check admin authentication status

      security:
        - cookieAuth: []

      responses:
        "200":
          description: Authentication status returned

        "429":
          description: Rate limit exceeded

  /api/admin/messages:
    get:
      summary: Get all contact messages

      security:
        - cookieAuth: []

      responses:
        "200":
          description: Messages returned

        "401":
          description: Unauthorized

        "429":
          description: Rate limit exceeded

        "500":
          description: Server error

  /api/admin/messages/{id}:
    delete:
      summary: Delete a contact message

      security:
        - cookieAuth: []

      parameters:
        - name: id
          in: path
          required: true

          schema:
            type: integer

      responses:
        "200":
          description: Message deleted

        "401":
          description: Unauthorized

        "429":
          description: Rate limit exceeded

        "500":
          description: Server error

  /api/posts:
    get:
      summary: Get all blog posts

      responses:
        "200":
          description: List of blog posts

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: "#/components/schemas/Post"

  /api/posts/{slug}:
    get:
      summary: Get single blog post

      parameters:
        - name: slug
          in: path
          required: true

          schema:
            type: string

      responses:
        "200":
          description: Blog post found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

        "404":
          description: Blog post not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/github/repos:
    get:
      summary: Get public GitHub repositories

      responses:
        "200":
          description: Repository list

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean

                  repos:
                    type: array

                    items:
                      $ref: "#/components/schemas/Repository"

        "502":
          description: GitHub service unavailable

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:

  securitySchemes:

    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  schemas:

    Post:
      type: object

      properties:
        slug:
          type: string

        title:
          type: string

        publishedAt:
          type: string

        description:
          type: string

        content:
          type: string

    Repository:
      type: object

      properties:
        name:
          type: string

        description:
          type: string

        stars:
          type: integer

        language:
          type: string

        url:
          type: string

    Error:
      type: object

      properties:
        success:
          type: boolean

        message:
          type: string